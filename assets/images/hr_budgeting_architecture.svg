<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">HR Budgeting WhatsApp Bot architecture</title>
  <desc id="desc">Layered architecture from WhatsApp channel through application services to repositories and integrations.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#0b3d91"/></marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#082b66" flood-opacity="0.12"/></filter>
  </defs>
  <rect width="1200" height="680" rx="28" fill="#f5f8fc"/>
  <text x="70" y="72" font-family="Segoe UI, Arial" font-size="34" font-weight="700" fill="#082b66">HR Budgeting WhatsApp Bot</text>
  <text x="70" y="108" font-family="Segoe UI, Arial" font-size="18" fill="#5f6b7a">Public-safe, layered solution architecture</text>

  <g font-family="Segoe UI, Arial" filter="url(#shadow)">
    <rect x="80" y="170" width="250" height="110" rx="18" fill="#ffffff" stroke="#cbdaf0"/>
    <text x="205" y="212" text-anchor="middle" font-size="20" font-weight="700" fill="#0b3d91">Channel</text>
    <text x="205" y="246" text-anchor="middle" font-size="17" fill="#31405a">WhatsApp + Webhook</text>

    <rect x="475" y="150" width="250" height="150" rx="18" fill="#ffffff" stroke="#cbdaf0"/>
    <text x="600" y="192" text-anchor="middle" font-size="20" font-weight="700" fill="#0b3d91">Application Layer</text>
    <text x="600" y="225" text-anchor="middle" font-size="16" fill="#31405a">Dispatcher · Router · Use Cases</text>
    <text x="600" y="253" text-anchor="middle" font-size="16" fill="#31405a">OTP · Drafts · Approvals</text>

    <rect x="870" y="170" width="250" height="110" rx="18" fill="#ffffff" stroke="#cbdaf0"/>
    <text x="995" y="212" text-anchor="middle" font-size="20" font-weight="700" fill="#0b3d91">Domain Rules</text>
    <text x="995" y="246" text-anchor="middle" font-size="16" fill="#31405a">Roles · BU Scope · Workflow</text>

    <rect x="210" y="430" width="260" height="120" rx="18" fill="#ffffff" stroke="#cbdaf0"/>
    <text x="340" y="474" text-anchor="middle" font-size="20" font-weight="700" fill="#0b3d91">Repository Interfaces</text>
    <text x="340" y="508" text-anchor="middle" font-size="16" fill="#31405a">Submission · Staff · Audit</text>

    <rect x="730" y="410" width="300" height="160" rx="18" fill="#ffffff" stroke="#cbdaf0"/>
    <text x="880" y="452" text-anchor="middle" font-size="20" font-weight="700" fill="#0b3d91">Infrastructure Adapters</text>
    <text x="880" y="486" text-anchor="middle" font-size="16" fill="#31405a">SQL · Email · Microsoft Graph</text>
    <text x="880" y="514" text-anchor="middle" font-size="16" fill="#31405a">WhatsApp · SharePoint Storage</text>
  </g>

  <g stroke="#0b3d91" stroke-width="4" fill="none" marker-end="url(#arrow)">
    <path d="M330 225 H465"/>
    <path d="M725 225 H860"/>
    <path d="M600 300 V360 H340 V420"/>
    <path d="M470 490 H720"/>
    <path d="M995 280 V350 H880 V400"/>
  </g>

  <g font-family="Segoe UI, Arial" font-size="15" fill="#5f6b7a">
    <text x="397" y="211" text-anchor="middle">events</text>
    <text x="792" y="211" text-anchor="middle">policies</text>
    <text x="602" y="388" text-anchor="middle">ports</text>
    <text x="595" y="476" text-anchor="middle">implementations</text>
  </g>
</svg>
