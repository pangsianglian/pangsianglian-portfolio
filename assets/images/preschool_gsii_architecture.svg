<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">Preschool GSII auto-reconciliation architecture</title>
  <desc id="desc">Pipeline from SharePoint file intake through validation, extraction, reconciliation and reporting.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#0b3d91"/></marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#082b66" flood-opacity="0.12"/></filter>
  </defs>
  <rect width="1200" height="700" rx="28" fill="#f5f8fc"/>
  <text x="70" y="72" font-family="Segoe UI, Arial" font-size="34" font-weight="700" fill="#082b66">Preschool GSII Auto-Reconciliation</text>
  <text x="70" y="108" font-family="Segoe UI, Arial" font-size="18" fill="#5f6b7a">Controlled multi-outlet monthly processing pipeline</text>

  <g font-family="Segoe UI, Arial" filter="url(#shadow)">
    <rect x="55" y="190" width="190" height="125" rx="18" fill="#fff" stroke="#cbdaf0"/>
    <text x="150" y="230" text-anchor="middle" font-size="19" font-weight="700" fill="#0b3d91">SharePoint Intake</text>
    <text x="150" y="263" text-anchor="middle" font-size="15" fill="#31405a">Outlet folders</text>
    <text x="150" y="288" text-anchor="middle" font-size="15" fill="#31405a">Microsoft Graph</text>

    <rect x="300" y="170" width="210" height="165" rx="18" fill="#fff" stroke="#cbdaf0"/>
    <text x="405" y="210" text-anchor="middle" font-size="19" font-weight="700" fill="#0b3d91">File Validation</text>
    <text x="405" y="244" text-anchor="middle" font-size="15" fill="#31405a">Password · Hash</text>
    <text x="405" y="269" text-anchor="middle" font-size="15" fill="#31405a">Naming · Completeness</text>
    <text x="405" y="294" text-anchor="middle" font-size="15" fill="#31405a">Audit trail</text>

    <rect x="565" y="190" width="190" height="125" rx="18" fill="#fff" stroke="#cbdaf0"/>
    <text x="660" y="230" text-anchor="middle" font-size="19" font-weight="700" fill="#0b3d91">Extraction</text>
    <text x="660" y="263" text-anchor="middle" font-size="15" fill="#31405a">GSII parsing</text>
    <text x="660" y="288" text-anchor="middle" font-size="15" fill="#31405a">Normalisation</text>

    <rect x="810" y="170" width="210" height="165" rx="18" fill="#fff" stroke="#cbdaf0"/>
    <text x="915" y="210" text-anchor="middle" font-size="19" font-weight="700" fill="#0b3d91">Rules Engine</text>
    <text x="915" y="244" text-anchor="middle" font-size="15" fill="#31405a">Subsidy matching</text>
    <text x="915" y="269" text-anchor="middle" font-size="15" fill="#31405a">Invoice checks</text>
    <text x="915" y="294" text-anchor="middle" font-size="15" fill="#31405a">Exceptions</text>

    <rect x="420" y="470" width="360" height="150" rx="18" fill="#fff" stroke="#cbdaf0"/>
    <text x="600" y="512" text-anchor="middle" font-size="20" font-weight="700" fill="#0b3d91">Controlled Outputs</text>
    <text x="600" y="548" text-anchor="middle" font-size="16" fill="#31405a">Adjustment file · Exception report</text>
    <text x="600" y="577" text-anchor="middle" font-size="16" fill="#31405a">Audit log · Dashboard-ready data</text>
  </g>

  <g stroke="#0b3d91" stroke-width="4" fill="none" marker-end="url(#arrow)">
    <path d="M245 252 H290"/>
    <path d="M510 252 H555"/>
    <path d="M755 252 H800"/>
    <path d="M915 335 V400 H600 V460"/>
  </g>

  <g font-family="Segoe UI, Arial" font-size="15" fill="#5f6b7a">
    <text x="268" y="238" text-anchor="middle">files</text>
    <text x="533" y="238" text-anchor="middle">verified</text>
    <text x="777" y="238" text-anchor="middle">records</text>
  </g>
</svg>
